name: Build and deploy React Vite app to Azure Web App - homeworksproject

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Install production dependencies for server
        run: npm ci --omit=dev

      # ✅ Copiar server.js y package.json DENTRO de dist/
      # para que todo quede en un solo paquete
      - name: Prepare deployment package
        run: |
          cp server.js dist/server.js
          cp package.json dist/package.json
          cp package-lock.json dist/package-lock.json
          cp -r node_modules dist/node_modules

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: dist        # ✅ dist/ ya contiene server.js + node_modules

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_377807F10084430F803790A248EABAE5 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_F1B8AA5E901344ECAF261394722D45DF }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_03BE4D9863304BCBB3B83589CFEFD057 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'homeworksproject'
          slot-name: 'Production'
          package: .
